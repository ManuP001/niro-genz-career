services:
  - type: web
    name: niro-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://niro-mira-api.onrender.com

  - type: web
    name: niro-mira-api
    env: docker
    rootDir: services/mira-api
    dockerfilePath: ./services/mira-api/Dockerfile
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGIN
        value: https://niro-genz-career.onrender.com
